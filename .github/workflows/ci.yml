name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Swift test
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Cache SwiftPM
        uses: actions/cache@v6.1.0
        with:
          path: |
            .build
            ~/.swiftpm
          key: swiftpm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}-${{ hashFiles('Package.swift') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-

      - name: Log toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve packages
        run: swift package resolve

      - name: Run tests
        run: swift test -Xswiftc -strict-concurrency=complete -Xswiftc -warn-concurrency -Xswiftc -warnings-as-errors

      - name: Build release executable
        run: swift build -c release --product agent-inbox -Xswiftc -strict-concurrency=complete -Xswiftc -warn-concurrency -Xswiftc -warnings-as-errors
